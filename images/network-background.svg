    <line class="line" x1="210" y1="78" x2="390" y2="155" />
    <line class="line" x1="210" y1="78" x2="310" y2="25" />
    <line class="line" x1="390" y1="155" x2="540" y2="90" />
    <line class="line" x1="390" y1="155" x2="480" y2="260" />
    <line class="line" x1="540" y1="90" x2="700" y2="140" />
    <line class="line" x1="540" y1="90" x2="620" y2="30" />
    <line class="line" x1="700" y1="140" x2="850" y2="80" />
    <line class="line" x1="700" y1="140" x2="760" y2="250" />
    <line class="line" x1="850" y1="80" x2="1010" y2="130" />
    <line class="line" x1="850" y1="80" x2="960" y2="20" />
    <line class="line" x1="1010" y1="130" x2="1160" y2="70" />
    <line class="line" x1="1010" y1="130" x2="1080" y2="240" />
    <line class="line" x1="1160" y1="70" x2="1300" y2="120" />
    <line class="line" x1="1300" y1="120" x2="1420" y2="65" />
