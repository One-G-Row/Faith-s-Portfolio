<svg viewBox="0 0 1440 900" xmlns="http://www.w3.org/2000/svg" width="1440" height="900">
  <defs>
    <style>
      .node { animation: pulse 3s ease-in-out infinite; }
      .node:nth-child(2n) { animation-delay: -1.5s; }
      .node:nth-child(3n) { animation-delay: -0.8s; }
      .node:nth-child(5n) { animation-delay: -2.1s; }
      .node:nth-child(7n) { animation-delay: -0.4s; }

      .line { animation: fadeLine 4s ease-in-out infinite; }
      .line:nth-child(2n) { animation-delay: -2s; }
      .line:nth-child(3n) { animation-delay: -1s; }
      .line:nth-child(5n) { animation-delay: -3s; }
      .line:nth-child(7n) { animation-delay: -0.5s; }

      .packet { animation: travel 6s linear infinite; }
      .packet:nth-child(2n) { animation-delay: -3s; }
      .packet:nth-child(3n) { animation-delay: -1.5s; }
      .packet:nth-child(5n) { animation-delay: -4.5s; }

      @keyframes pulse {
        0%, 100% { opacity: 0.5; r: 4; }
        50% { opacity: 1; r: 6; }
      }

      @keyframes fadeLine {
        0%, 100% { opacity: 0.1; }
        50% { opacity: 0.45; }
      }

      @keyframes travel {
        0% { offset-distance: 0%; opacity: 0; }
        5% { opacity: 1; }
        95% { opacity: 1; }
        100% { offset-distance: 100%; opacity: 0; }
      }

      .glow-node { animation: glowPulse 4s ease-in-out infinite; }
      .glow-node:nth-child(2n) { animation-delay: -2s; }
      .glow-node:nth-child(3n) { animation-delay: -1s; }

      @keyframes glowPulse {
        0%, 100% { opacity: 0; r: 10; }
        50% { opacity: 0.25; r: 18; }
      }
    </style>

    <!-- Dark background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030712"/>
      <stop offset="50%" stop-color="#050d1f"/>
      <stop offset="100%" stop-color="#020810"/>
    </linearGradient>

    <!-- Node glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="softglow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Packet dot -->
    <circle id="dot" r="2.5" fill="#38bdf8"/>
    <circle id="dot-accent" r="2" fill="#a78bfa"/>
    <circle id="dot-green" r="2" fill="#34d399"/>
  </defs>

  <!-- Background -->
  <rect width="1440" height="900" fill="url(#bg)"/>

  <!-- ═══════════════════════════════════════════ -->
  <!--              NETWORK LINES                  -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- Primary mesh lines -->
  <g stroke="#1e40af" stroke-width="0.8">
