    <!-- Top row -->
    <circle class="node" cx="72" cy="135" r="4"/>
    <circle class="node" cx="210" cy="78" r="5.5"/>
    <circle class="node" cx="310" cy="25" r="3.5"/>
    <circle class="node" cx="390" cy="155" r="4.5"/>
    <circle class="node" cx="540" cy="90" r="4.5"/>
    <circle class="node" cx="620" cy="30" r="3.5"/>
    <circle class="node" cx="700" cy="140" r="5.5"/>
    <circle class="node" cx="850" cy="80" r="4.5"/>
    <circle class="node" cx="960" cy="20" r="3.5"/>
    <circle class="node" cx="1010" cy="130" r="5.5"/>
    <circle class="node" cx="1160" cy="70" r="4.5"/>
    <circle class="node" cx="1300" cy="120" r="4.5"/>
