    <circle class="node" cx="500" cy="680" r="4.5"/>
    <circle class="node" cx="820" cy="670" r="4.5"/>
    <circle class="node" cx="1140" cy="660" r="4.5"/>
    <circle class="node" cx="1420" cy="640" r="3.5"/>
    <!-- Floor -->
