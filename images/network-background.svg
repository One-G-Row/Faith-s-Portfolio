    <line class="line" x1="310" y1="25" x2="390" y2="155" />
    <line class="line" x1="620" y1="30" x2="700" y2="140" />
    <line class="line" x1="960" y1="20" x2="1010" y2="130" />
    <line class="line" x1="150" y1="280" x2="210" y2="78" />
    <line class="line" x1="310" y1="340" x2="390" y2="155" />
