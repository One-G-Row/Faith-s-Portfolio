    <circle class="glow-node" cx="1060" cy="490" r="14"/>
    <circle class="glow-node" cx="660" cy="620" r="14"/>
  </g>
  <g filter="url(#softglow)" fill="#a78bfa">
    <circle class="glow-node" cx="310" cy="340" r="12"/>
    <circle class="glow-node" cx="760" cy="250" r="12"/>
    <circle class="glow-node" cx="430" cy="510" r="12"/>
    <circle class="glow-node" cx="980" cy="610" r="12"/>
  </g>

  <!-- ═══════════════════════════════════════════ -->
  <!--                  NODES                      -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- Primary hub nodes (blue) -->
