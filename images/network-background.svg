    <circle class="node" cx="430" cy="510" r="4.5"/>
    <circle class="node" cx="740" cy="500" r="4.5"/>
    <circle class="node" cx="1060" cy="490" r="4.5"/>
    <circle class="node" cx="1390" cy="480" r="4"/>
    <!-- Bottom cluster -->
