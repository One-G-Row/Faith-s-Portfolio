    <line class="line" x1="700" y1="140" x2="1010" y2="130" />
    <line class="line" x1="310" y1="340" x2="760" y2="250" />
    <line class="line" x1="480" y1="260" x2="920" y2="310" />
    <line class="line" x1="580" y1="450" x2="1060" y2="490" />
    <line class="line" x1="340" y1="600" x2="820" y2="670" />
    <line class="line" x1="660" y1="620" x2="1140" y2="660" />
  </g>

  <!-- Purple accent lines -->
  <g stroke="#7c3aed" stroke-width="0.5">
    <line class="line" x1="150" y1="280" x2="620" y2="330" />
    <line class="line" x1="760" y1="250" x2="1230" y2="300" />
    <line class="line" x1="270" y1="430" x2="740" y2="500" />
    <line class="line" x1="820" y1="670" x2="1300" y2="600" />
