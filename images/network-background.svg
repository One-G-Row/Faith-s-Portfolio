    <line class="line" x1="430" y1="510" x2="580" y2="450" />
    <line class="line" x1="580" y1="450" x2="740" y2="500" />
    <line class="line" x1="740" y1="500" x2="900" y2="440" />
    <line class="line" x1="900" y1="440" x2="1060" y2="490" />
    <line class="line" x1="1060" y1="490" x2="1220" y2="430" />
