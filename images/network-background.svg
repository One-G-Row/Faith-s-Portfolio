    <line class="line" x1="270" y1="430" x2="340" y2="600" />
    <line class="line" x1="430" y1="510" x2="500" y2="680" />
    <line class="line" x1="580" y1="450" x2="660" y2="620" />
    <line class="line" x1="740" y1="500" x2="820" y2="670" />
    <line class="line" x1="900" y1="440" x2="980" y2="610" />
    <line class="line" x1="1060" y1="490" x2="1140" y2="660" />
