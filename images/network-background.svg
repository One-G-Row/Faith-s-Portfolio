    <line class="line" x1="150" y1="280" x2="310" y2="340" />
    <line class="line" x1="310" y1="340" x2="480" y2="260" />
    <line class="line" x1="480" y1="260" x2="620" y2="330" />
    <line class="line" x1="620" y1="330" x2="760" y2="250" />
    <line class="line" x1="760" y1="250" x2="920" y2="310" />
    <line class="line" x1="920" y1="310" x2="1080" y2="240" />
    <line class="line" x1="1080" y1="240" x2="1230" y2="300" />
    <line class="line" x1="1230" y1="300" x2="1380" y2="230" />
    <line class="line" x1="1380" y1="230" x2="1440" y2="340" />

