<svg viewBox="0 0 1440 900" xmlns="http://www.w3.org/2000/svg" width="1440" height="900">
  <defs>
    <style>
      /* GPU-friendly: only animating opacity and transform */
      .node {
        animation: pulse 4s ease-in-out infinite;
        will-change: opacity;
      }
      .node:nth-child(2n) { animation-delay: -2s; }
      .node:nth-child(3n) { animation-delay: -1s; }
      .node:nth-child(5n) { animation-delay: -3s; }
      .node:nth-child(7n) { animation-delay: -0.5s; }

      .line {
        animation: fadeLine 5s ease-in-out infinite;
        will-change: opacity;
      }
      .line:nth-child(2n) { animation-delay: -2.5s; }
      .line:nth-child(3n) { animation-delay: -1.2s; }
      .line:nth-child(5n) { animation-delay: -3.5s; }
      .line:nth-child(7n) { animation-delay: -0.8s; }

      @keyframes pulse {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 1; }
      }

      @keyframes fadeLine {
        0%, 100% { opacity: 0.08; }
        50% { opacity: 0.4; }
      }

      /* Reduced-motion: disable all animations */
      @media (prefers-reduced-motion: reduce) {
        .node, .line, circle { animation: none !important; }
      }
    </style>

    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030712"/>
      <stop offset="50%" stop-color="#050d1f"/>
      <stop offset="100%" stop-color="#020810"/>
    </linearGradient>

    <!-- Packet paths -->
