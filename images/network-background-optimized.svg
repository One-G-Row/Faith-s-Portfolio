    <path id="p4" d="M310,340 L480,260 L620,330 L760,250 L920,310 L1080,240 L1230,300 L1380,230"/>
    <path id="p5" d="M72,135 L150,280 L270,430 L580,450 L900,440 L1220,430 L1390,480 L1420,640"/>
